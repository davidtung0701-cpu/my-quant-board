name: Run Quant Board Daily

on:
  workflow_dispatch:
  schedule:
    - cron: '10 23 * * 1-6'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    # 升級至 v4 與 v5，全面對齊 Node 24 核心環境
    - name: 簽出程式碼
      uses: actions/checkout@v4

    - name: 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 下載最新量化依賴套件
      run: |
        pip install --upgrade pip
        pip install yfinance pandas requests beautifulsoup4

    - name: 實體擊發量化巡航日報
      run: python board_make.py
